<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>業績回報 - 中科15B</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --bg:#f6f6f8; --card:#fff; --line:#e7e7ec; --text:#1c1c1e;
    --muted:#6e6e73; --brand:#06c755; --brand-dim:#0bb14b;
    --warn:#d92d20; --accent:#0f62fe;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;padding:12px 12px 100px}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 10px;color:#000}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0}
  .row label{flex:1;color:var(--muted)}
  .row .val{font-weight:600;color:#000}
  input[type=number]{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:130px;text-align:right;background:#fff}
  input[type=number]:focus{outline:2px solid var(--accent);outline-offset:-2px}
  input[type=text]{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%;background:#fff}
  .meal-tile{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;background:#fafafa;cursor:pointer;user-select:none}
  .meal-tile.on{background:#e8f8ee;border-color:var(--brand)}
  .meal-tile .name{font-weight:600}
  .meal-tile .plus{width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
  .meal-tile.on .plus{background:var(--brand);color:#fff;border-color:var(--brand)}
  .meal-fields{display:none;padding:8px 0 4px}
  .meal-tile.on + .meal-fields{display:block}
  .sum-line{display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding-top:8px;margin-top:8px;font-weight:600}
  .sum-line .val{color:var(--brand-dim)}
  .person-tile{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;background:#fafafa;cursor:pointer;user-select:none}
  .person-tile.on{background:#e8f4ff;border-color:var(--accent)}
  .person-tile .plus{width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
  .person-tile.on .plus{background:var(--accent);color:#fff;border-color:var(--accent)}
  .person-fields{display:none;padding:10px 4px 6px;background:#fff;border:1px solid var(--line);border-radius:10px;margin:-4px 0 8px}
  .person-tile.on + .person-fields{display:block}
  .person-fields .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .person-fields .field label{display:block;color:var(--muted);font-size:13px;margin-bottom:2px}
  .person-fields .time-display{font-weight:600;color:#000;font-size:14px}
  .slider-row{display:flex;align-items:center;gap:8px}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent)}
  .grp-label{font-size:13px;color:var(--muted);margin:10px 0 4px}
  #addOther{background:transparent;border:1px dashed var(--line);border-radius:10px;padding:10px;color:var(--muted);width:100%;text-align:center;font:inherit;margin-top:6px}
  .submit-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px;display:flex;gap:10px}
  button.primary{flex:1;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:12px;font-size:16px;font-weight:600;font:inherit}
  button.primary:disabled{background:#c8c8cd}
  .err{color:var(--warn);font-size:13px;margin-top:4px}
  .small{font-size:12px;color:var(--muted)}
  .monthly-row{background:#fffbe6;border:1px solid #f3d488;border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .monthly-row button{background:none;border:1px solid #d29400;color:#a86c00;padding:4px 10px;border-radius:6px;font:inherit;font-size:12px}
  .pick-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .icon-btn{background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 4px;color:var(--accent)}
  #dateInput{font:inherit;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:#fff}
  input[type=time].time-wheel{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:110px;text-align:center;background:#fff;font-size:16px}
  .hh-stepper{display:flex;align-items:center;gap:6px;justify-content:flex-end}
  .hh-stepper input[type=number]{width:60px;padding:6px;text-align:center;font:inherit;border:1px solid var(--line);border-radius:6px}
  .hh-stepper button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;font:inherit;cursor:pointer}
  .hh-unit{font-size:13px;color:var(--muted)}
  .ot-wrap{margin-top:8px}
  .ot-toggle{background:transparent;border:1px dashed var(--line);border-radius:8px;padding:6px 12px;color:var(--accent);font:inherit;cursor:pointer;font-size:13px}
  .ot-field{margin-top:8px}
  .ot-field label{display:block;color:var(--muted);font-size:13px;margin-bottom:4px}
</style>
</head>
<body>

<h1>業績回報 - 中科15B</h1>
<div class="sub" id="hdrSub">--</div>

<div class="card">
  <h2>📋 基本資訊</h2>
  <div class="row"><label>日期</label>
    <div class="val" id="dateDisp" style="display:flex;align-items:center;gap:6px">
      <span id="dateText">--</span>
      <button type="button" id="editDateBtn" class="icon-btn" title="修改日期">✏️</button>
      <input type="date" id="dateInput" style="display:none">
    </div>
  </div>
  <div class="row"><label>場域</label><div class="val">中科台積電15B</div></div>
  <div class="row"><label>填寫人</label><div class="val" id="userDisp">--</div></div>
</div>

<div class="card">
  <h2>👥 來客數 / 客單價</h2>
  <div class="row"><label>本日來客數</label><input type="number" min="0" id="guestCount" placeholder="0"></div>
  <div class="row"><label>客單價（自動）</label><div class="val" id="atvDisp">--</div></div>
</div>

<div class="card">
  <h2>🍱 各餐別</h2>
  <div class="small" style="margin-bottom:8px">點 + 展開填寫</div>

  <div id="mealList"></div>

  <div class="sum-line"><span>全日營業額</span><span class="val" id="daySum">$0</span></div>
</div>

<div class="card">
  <h2>📊 當月營業額</h2>
  <div class="monthly-row">
    <div>
      <div class="small">本月（含今日）累積</div>
      <div class="val" id="monthSum" style="font-size:18px">$0</div>
    </div>
    <button id="fixMonth">修正</button>
  </div>
  <div class="small">⚠️ 累積值存在這隻手機本機。若換手機 / 沒回報 → 按「修正」手填正確金額</div>
</div>

<div class="card">
  <h2>⏱ 當日上班人員</h2>
  <div class="small" style="margin-bottom:6px">點員工 + 展開填工時，「其他」可手填名字</div>

  <div id="personList"></div>
  <button id="addOther" type="button">+ 其他（手填）</button>
</div>

<div id="errBox" class="err"></div>

<div class="submit-bar">
  <button id="btnSubmit" class="primary" type="button" disabled>請先填完必填欄位</button>
</div>

<script>
const LIFF_ID = "2010233112-XCCgtapU";
const MEALS = [
  { key:"lunch",  label:"午餐",   emoji:"🍱" },
  { key:"dinner", label:"晚餐",   emoji:"🍽️" },
  { key:"muscle", label:"燃肌餐", emoji:"💪" },
  { key:"preorder", label:"預訂餐", emoji:"📦" }
];

// === Date helpers ===
function rocFromDate(d){
  const y = d.getFullYear() - 1911;
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return { roc:`${y}.${m}.${dd} (${w})`, ym:`${y}_${m}`, iso: `${d.getFullYear()}-${m}-${dd}` };
}
function fmtNT(n){ return "$" + Number(n||0).toLocaleString('zh-TW'); }

// === State (mutable date) ===
let STATE = rocFromDate(new Date());
let MONTH_KEY = "monthly_total_" + STATE.ym;
function getMonth(){ return parseInt(localStorage.getItem(MONTH_KEY) || "0", 10); }
function setMonth(v){ localStorage.setItem(MONTH_KEY, String(Math.max(0, parseInt(v,10) || 0))); }
function updateDate(d){
  STATE = rocFromDate(d);
  MONTH_KEY = "monthly_total_" + STATE.ym;
  document.getElementById('dateText').textContent = STATE.roc;
  document.getElementById('hdrSub').textContent = STATE.roc;
  document.getElementById('dateInput').value = STATE.iso;
  recalc();
}

// === Boot ===
let profile = { displayName: "(未取得)", userId: null };
let employees = null;
let dayTotal = 0;

async function boot(){
  document.getElementById('dateText').textContent = STATE.roc;
  document.getElementById('dateInput').value = STATE.iso;
  document.getElementById('hdrSub').textContent = STATE.roc;
  await Promise.all([initLiff(), loadEmployees()]);
  renderMeals();
  renderPersons();
  attachHandlers();
  refreshMonthly();
}

async function initLiff(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    document.getElementById('userDisp').textContent = profile.displayName;
  } catch(e){
    document.getElementById('userDisp').textContent = "(LIFF 載入失敗)";
    console.warn(e);
  }
}

async function loadEmployees(){
  try{
    const res = await fetch('employees.json?v=' + Date.now(), { cache:"no-store" });
    employees = await res.json();
  } catch(e){
    employees = { site:"中科台積電15B", groups:[] };
  }
}

// === Meals ===
function renderMeals(){
  const host = document.getElementById('mealList');
  host.innerHTML = "";
  MEALS.forEach(m => {
    const tile = document.createElement('div');
    tile.className = 'meal-tile';
    tile.dataset.key = m.key;
    tile.innerHTML = `<div class="name">${m.emoji} ${m.label}</div><div class="plus">+</div>`;
    const fields = document.createElement('div');
    fields.className = 'meal-fields';
    fields.innerHTML = `
      <div class="row"><label>餐數</label><input type="number" min="0" data-meal="${m.key}" data-k="count" placeholder="0"></div>
      <div class="row"><label>營業額</label><input type="number" min="0" data-meal="${m.key}" data-k="amount" placeholder="0"></div>
    `;
    tile.addEventListener('click', e=>{
      if (e.target.tagName === 'INPUT') return;
      tile.classList.toggle('on');
      recalc();
    });
    host.appendChild(tile);
    host.appendChild(fields);
  });
  host.querySelectorAll('input[type=number]').forEach(inp =>
    inp.addEventListener('input', recalc)
  );
}

// === Persons ===
function renderPersons(){
  const host = document.getElementById('personList');
  host.innerHTML = "";
  (employees.groups || []).forEach(g => {
    const lbl = document.createElement('div');
    lbl.className = 'grp-label';
    lbl.textContent = g.label;
    host.appendChild(lbl);
    g.members.forEach(name => host.appendChild(buildPersonTile(name, g.label, false)));
  });
}

function buildPersonTile(name, group, isOther){
  const tile = document.createElement('div');
  tile.className = 'person-tile';
  tile.dataset.name = name;
  tile.dataset.group = group;
  if (isOther) tile.dataset.other = '1';
  tile.innerHTML = `<div class="name">${name}</div><div class="plus">+</div>`;

  const fields = document.createElement('div');
  fields.className = 'person-fields';
  const otherInput = isOther ? `
    <div class="field" style="grid-column:1/-1">
      <label>姓名</label>
      <input type="text" data-k="name" value="${name === '其他' ? '' : name}" placeholder="手填姓名">
    </div>` : '';
  fields.innerHTML = `
    <div class="grid">
      ${otherInput}
      <div class="field"><label>上班</label>${timeWheelInput('start')}</div>
      <div class="field"><label>下班</label>${timeWheelInput('end')}</div>
      <div class="field"><label>休息（小時）</label>${halfHourStepper('rest')}</div>
    </div>
    <div class="ot-wrap">
      <button type="button" class="ot-toggle">＋ 加班</button>
      <div class="ot-field" style="display:none">
        <label>加班（小時）</label>${halfHourStepper('ot')}
      </div>
    </div>
  `;
  // Wire up OT toggle
  setTimeout(()=>{
    const otBtn = fields.querySelector('.ot-toggle');
    const otField = fields.querySelector('.ot-field');
    if (otBtn && otField){
      otBtn.addEventListener('click', ()=>{
        const showing = otField.style.display !== 'none';
        otField.style.display = showing ? 'none' : 'block';
        otBtn.textContent = showing ? '＋ 加班' : '− 隱藏加班';
        if (showing){
          // reset to 0 when hiding
          const otIn = otField.querySelector('input[data-k="ot"]');
          if (otIn) otIn.value = 0;
        }
      });
    }
    // Wire stepper +/- buttons
    fields.querySelectorAll('.hh-stepper').forEach(stepper=>{
      const input = stepper.querySelector('input[type=number]');
      stepper.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          let v = parseFloat(input.value) || 0;
          v += (btn.dataset.act === 'plus') ? 0.5 : -0.5;
          v = Math.max(0, Math.min(6, v));
          input.value = v;
        });
      });
    });
  }, 0);
  tile.addEventListener('click', e=>{
    if (e.target.closest('.person-fields') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    tile.classList.toggle('on');
    validate();   // BUG fix: validate after person toggle
  });

  // group tile + fields together
  const wrapper = document.createElement('div');
  wrapper.appendChild(tile);
  wrapper.appendChild(fields);
  return wrapper;
}

function timeWheelInput(k){
  // Use native time input → renders as wheel picker on iOS/Android
  const def = k === 'start' ? "09:00" : "20:00";
  return `<input type="time" step="1800" value="${def}" data-k="${k}" class="time-wheel">`;
}
function halfHourStepper(k){
  return `<div class="hh-stepper">
    <button type="button" data-act="minus" data-k="${k}">−</button>
    <input type="number" min="0" max="6" step="0.5" value="0" data-k="${k}">
    <span class="hh-unit">h</span>
    <button type="button" data-act="plus" data-k="${k}">＋</button>
  </div>`;
}
function fmtT(v){
  // accept either "HH:MM" or numeric hours
  if (typeof v === 'string' && v.includes(':')) return v;
  const f = parseFloat(v);
  const h = Math.floor(f);
  const m = (f - h) === 0.5 ? "30" : "00";
  return String(h).padStart(2,'0') + ":" + m;
}
function timeToFloat(t){
  if (typeof t === 'number') return t;
  const [h, m] = (t || '00:00').split(':').map(Number);
  return h + (m || 0)/60;
}
window.fmtT = fmtT;

// === Calc ===
function recalc(){
  let total = 0;
  document.querySelectorAll('.meal-tile.on').forEach(tile=>{
    const k = tile.dataset.key;
    const amt = parseInt(document.querySelector(`[data-meal="${k}"][data-k="amount"]`).value || "0", 10);
    total += amt;
  });
  dayTotal = total;
  document.getElementById('daySum').textContent = fmtNT(total);

  const guests = parseInt(document.getElementById('guestCount').value || "0", 10);
  document.getElementById('atvDisp').textContent = guests > 0 ? fmtNT(Math.round(total / guests)) : "--";

  // monthly preview = saved + today
  const monthly = getMonth() + total;
  document.getElementById('monthSum').textContent = fmtNT(monthly);

  validate();
}

function refreshMonthly(){
  document.getElementById('monthSum').textContent = fmtNT(getMonth() + dayTotal);
}

function validate(){
  const btn = document.getElementById('btnSubmit');
  const guests = parseInt(document.getElementById('guestCount').value || "0", 10);
  const anyMeal = document.querySelectorAll('.meal-tile.on').length > 0;
  const anyPerson = document.querySelectorAll('.person-tile.on').length > 0;
  if (guests > 0 && anyMeal && anyPerson){
    btn.disabled = false;
    btn.textContent = "送出回報";
  } else {
    btn.disabled = true;
    btn.textContent = "請先填完必填欄位";
  }
}

// === Handlers ===
function attachHandlers(){
  document.getElementById('guestCount').addEventListener('input', recalc);
  document.getElementById('editDateBtn').addEventListener('click', ()=>{
    const inp = document.getElementById('dateInput');
    inp.style.display = 'inline-block';
    inp.focus();
    if (inp.showPicker) try { inp.showPicker(); } catch(e){}
  });
  document.getElementById('dateInput').addEventListener('change', e=>{
    const v = e.target.value;
    if (v) updateDate(new Date(v + 'T00:00:00'));
    e.target.style.display = 'none';
  });
  document.getElementById('fixMonth').addEventListener('click', ()=>{
    const cur = getMonth();
    const v = prompt("請輸入本月累積營業額（不含今日）：", String(cur));
    if (v !== null) { setMonth(v); recalc(); }
  });
  document.getElementById('addOther').addEventListener('click', ()=>{
    const host = document.getElementById('personList');
    const w = buildPersonTile('其他', '兼職', true);
    host.appendChild(w);
  });
  document.getElementById('btnSubmit').addEventListener('click', submit);
}

// === Collect + Submit ===
function collect(){
  const guests = parseInt(document.getElementById('guestCount').value || "0", 10);
  const meals = [];
  document.querySelectorAll('.meal-tile.on').forEach(tile=>{
    const k = tile.dataset.key;
    const meta = MEALS.find(m=>m.key===k);
    const count = parseInt(document.querySelector(`[data-meal="${k}"][data-k="count"]`).value || "0", 10);
    const amount = parseInt(document.querySelector(`[data-meal="${k}"][data-k="amount"]`).value || "0", 10);
    meals.push({ key:k, label:meta.label, count, amount });
  });
  const persons = [];
  document.querySelectorAll('.person-tile.on').forEach(tile=>{
    const wrapper = tile.parentElement;
    const fields = wrapper.querySelector('.person-fields');
    let name = tile.dataset.name;
    if (tile.dataset.other === '1'){
      const inp = fields.querySelector('input[data-k="name"]');
      if (inp && inp.value.trim()) name = inp.value.trim();
    }
    const startStr = fields.querySelector('input[data-k="start"]').value;
    const endStr = fields.querySelector('input[data-k="end"]').value;
    const start = timeToFloat(startStr);
    const end = timeToFloat(endStr);
    const restEl = fields.querySelector('input[data-k="rest"]');
    const otEl = fields.querySelector('input[data-k="ot"]');
    const rest = restEl ? parseFloat(restEl.value) || 0 : 0;
    const ot = (otEl && fields.querySelector('.ot-field') && fields.querySelector('.ot-field').style.display !== 'none')
      ? (parseFloat(otEl.value) || 0) : 0;
    const worked = (end > start ? end - start : end + 24 - start) - rest;
    persons.push({ name, group: tile.dataset.group, start: startStr, end: endStr, rest, ot, worked: Math.max(0, worked) });
  });
  const dayAmt = meals.reduce((s,m)=>s+m.amount, 0);
  const atv = guests > 0 ? Math.round(dayAmt / guests) : 0;
  const monthTotal = getMonth() + dayAmt;
  return {
    date: STATE.roc, site:"中科台積電15B", reporter: profile.displayName,
    guests, atv, meals, persons, dayAmt, monthTotal
  };
}

function buildText(d){
  const lines = [];
  lines.push('日期：' + d.date);
  lines.push('場域：' + d.site);
  lines.push('填寫人：' + d.reporter);
  lines.push('');
  lines.push('本日來客數：' + d.guests);
  lines.push('客單價(當日業績/來客數)：' + d.atv);
  d.meals.forEach(m => {
    lines.push('');
    lines.push('【' + m.label + '】');
    lines.push('餐數：' + m.count);
    lines.push('營業額：' + m.amount);
  });
  lines.push('');
  lines.push('全日營業額：' + d.dayAmt);
  lines.push('');
  lines.push('當月營業額加總：' + d.monthTotal);
  lines.push('---');
  lines.push('當日上班人員');
  // group persons by group label
  const byGroup = {};
  d.persons.filter(p => p.name && p.name.trim()).forEach(p=>{
    (byGroup[p.group] = byGroup[p.group] || []).push(p);
  });
  Object.keys(byGroup).forEach(g => {
    lines.push('');
    lines.push(g + '：');
    byGroup[g].forEach(p => {
      const otStr = p.ot > 0 ? '，加' + p.ot : '';
      lines.push(p.name + '：' + p.start + '-' + p.end + '（休' + p.rest + otStr + '）');
    });
  });
  return lines.join('\n');
}

async function submit(){
  const errBox = document.getElementById('errBox');
  errBox.textContent = "";
  try{
    const d = collect();
    const text = buildText(d);
    if (!liff || !liff.sendMessages){
      errBox.textContent = "LIFF SDK 未載入，無法送出";
      return;
    }
    const payload = [{ type:'text', text }];
    try{
      await liff.sendMessages(payload);
    } catch(sendErr){
      // log full payload to help debug
      console.error('sendMessages failed', sendErr, JSON.stringify(payload));
      const payloadStr = JSON.stringify(payload);
      errBox.innerHTML = '送出失敗：' + (sendErr.code || '') + ' ' + (sendErr.message || sendErr) +
        '<br><small>payload 長度 ' + payloadStr.length + ' bytes</small>' +
        '<br><details style="margin-top:6px"><summary style="cursor:pointer">查看 Flex JSON</summary>' +
        '<textarea readonly style="width:100%;height:160px;font-size:10px;font-family:monospace">' +
        payloadStr.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</textarea></details>';
      return;
    }
    setMonth(getMonth() + d.dayAmt);
    const btn = document.getElementById('btnSubmit');
    btn.textContent = "✓ 已送出";
    btn.disabled = true;
    setTimeout(()=>{ try{ liff.closeWindow(); } catch(e){} }, 800);
  } catch(e){
    console.error('submit error', e);
    errBox.textContent = "送出失敗：" + (e.message || e);
  }
}

boot();
</script>
</body>
</html>
