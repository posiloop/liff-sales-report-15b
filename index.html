<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>業績回報 - 中科15B</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    /* 益碗之間 brand palette */
    --brand:#8F2E29;          /* deep red (益 logo) */
    --brand-dim:#6f1f1c;
    --gold:#D4B584;           /* tan/gold (frame) */
    --gold-soft:#f5ecdb;
    --bg:#fafaf6;             /* slight warm bg */
    --card:#fff;
    --line:#e7e3da;
    --text:#1c1815;
    --muted:#7a716a;
    --accent:#0f62fe;
    --warn:#d92d20;
    --success:#06c755;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;padding:0 0 100px}
  .app-header{
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dim) 100%);
    color:#fff;padding:16px 14px 22px;margin:0 0 14px;
    border-radius:0 0 18px 18px;box-shadow:0 4px 18px rgba(143,46,41,.18);
  }
  .app-header h1{font-size:18px;margin:0 0 2px;font-weight:700;letter-spacing:.3px}
  .app-header .sub{color:var(--gold-soft);font-size:13px;margin:0}
  .container{padding:0 12px}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(143,46,41,.04)}
  .card h2{font-size:15px;margin:0 0 12px;color:var(--brand);font-weight:700;display:flex;align-items:center;gap:6px;border-bottom:2px solid var(--gold-soft);padding-bottom:8px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0}
  .row label{flex:1;color:var(--muted)}
  .row .val{font-weight:600;color:#000}
  input[type=number]{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:130px;text-align:right;background:#fff}
  input[type=number]:focus{outline:2px solid var(--accent);outline-offset:-2px}
  input[type=text]{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%;background:#fff}
  .meal-tile{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0;background:linear-gradient(180deg,#fff,#fafaf6);cursor:pointer;user-select:none;transition:all .15s}
  .meal-tile:active{transform:scale(.98)}
  .meal-tile.on{background:linear-gradient(180deg,#fff5e6,var(--gold-soft));border-color:var(--brand);box-shadow:0 2px 8px rgba(143,46,41,.12)}
  .meal-tile .name{font-weight:600;font-size:15px}
  .meal-tile .plus{width:30px;height:30px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);transition:all .15s}
  .meal-tile.on .plus{background:var(--brand);color:#fff;border-color:var(--brand);transform:rotate(45deg)}
  .meal-fields{display:none;padding:8px 0 4px}
  .meal-tile.on + .meal-fields{display:block}
  .sum-line{display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding-top:8px;margin-top:8px;font-weight:600}
  .sum-line .val{color:var(--brand-dim)}
  .person-tile{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin:6px 0;background:#fff;cursor:pointer;user-select:none;transition:all .15s}
  .person-tile:active{transform:scale(.98)}
  .person-tile.on{background:linear-gradient(180deg,#fff,#f5ecdb);border-color:var(--gold)}
  .person-tile .name{font-weight:600}
  .person-tile .plus{width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);transition:all .15s}
  .person-tile.on .plus{background:var(--brand);color:#fff;border-color:var(--brand);transform:rotate(45deg)}
  .person-fields{display:none;padding:10px 4px 6px;background:#fff;border:1px solid var(--line);border-radius:10px;margin:-4px 0 8px}
  .person-tile.on + .person-fields{display:block}
  .person-fields .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .person-fields .field label{display:block;color:var(--muted);font-size:13px;margin-bottom:2px}
  .person-fields .time-display{font-weight:600;color:#000;font-size:14px}
  .slider-row{display:flex;align-items:center;gap:8px}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent)}
  .grp-label{font-size:13px;color:var(--muted);margin:10px 0 4px}
  #addOther{background:transparent;border:1px dashed var(--line);border-radius:10px;padding:10px;color:var(--muted);width:100%;text-align:center;font:inherit;margin-top:6px}
  .submit-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px;display:flex;gap:10px;box-shadow:0 -2px 12px rgba(0,0,0,.05)}
  button.primary{flex:1;background:linear-gradient(135deg,var(--brand),var(--brand-dim));color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;font:inherit;letter-spacing:.5px;box-shadow:0 4px 12px rgba(143,46,41,.25);cursor:pointer}
  button.primary:disabled{background:#c8c8cd;box-shadow:none;cursor:not-allowed}
  .err{color:var(--warn);font-size:13px;margin-top:4px}
  .small{font-size:12px;color:var(--muted)}
  .monthly-row{background:linear-gradient(135deg,var(--gold-soft),#fdf3df);border:1px solid var(--gold);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .monthly-row button{background:#fff;border:1px solid var(--brand);color:var(--brand);padding:6px 12px;border-radius:8px;font:inherit;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
  .monthly-row button:active{transform:scale(.96)}
  .grp-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .grp-toggle button{padding:8px;background:#fff;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
  .grp-toggle button.on{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600}
  .amount-override{background:transparent;border:1px solid var(--line);border-radius:8px;width:36px;height:36px;font-size:14px;cursor:pointer;flex-shrink:0}
  .amount-override:active{background:var(--gold-soft)}
  .pick-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .icon-btn{background:transparent;border:none;font-size:16px;cursor:pointer;padding:2px 4px;color:var(--accent)}
  #dateInput{font:inherit;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:#fff}
  button.time-wheel{font:inherit;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:110px;text-align:center;background:#fff;font-size:16px;cursor:pointer;color:var(--text)}
  /* Custom wheel picker */
  .tp-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .tp-sheet{background:#fff;border-radius:16px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3)}
  .tp-title{padding:16px;text-align:center;font-weight:600;color:var(--accent);border-bottom:1px solid var(--line);font-size:16px}
  .tp-cols{position:relative;display:grid;grid-template-columns:1fr 1fr;padding:8px 0 0;height:236px}
  .tp-col-label{position:absolute;top:8px;font-size:13px;color:var(--muted);text-align:center;width:50%;font-weight:500}
  .tp-col-label:nth-child(1){left:0}.tp-col-label:nth-child(2){left:50%}
  .tp-col{height:200px;margin-top:24px;overflow-y:scroll;scroll-snap-type:y mandatory;text-align:center;-webkit-overflow-scrolling:touch}
  .tp-col::-webkit-scrollbar{display:none}
  .tp-col{scrollbar-width:none}
  .tp-item{height:40px;line-height:40px;font-size:20px;color:var(--muted);scroll-snap-align:center;font-variant-numeric:tabular-nums}
  .tp-item.selected{color:var(--text);font-weight:600}
  .tp-highlight{position:absolute;top:calc(24px + 80px);left:0;right:0;height:40px;background:rgba(15,98,254,.08);border-top:1px solid var(--accent);border-bottom:1px solid var(--accent);pointer-events:none}
  .tp-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line)}
  .tp-actions button{padding:14px;border:none;background:transparent;font:inherit;font-size:16px;cursor:pointer}
  .tp-cancel{color:var(--muted);border-right:1px solid var(--line)}
  .tp-ok{color:var(--accent);font-weight:600}
  /* Person remove */
  .person-remove{background:transparent;border:1px solid var(--line);border-radius:50%;width:24px;height:24px;font-size:11px;color:var(--warn);cursor:pointer;padding:0;line-height:1}
  .hh-stepper{display:flex;align-items:center;gap:6px;justify-content:flex-end}
  .hh-stepper input[type=number]{width:60px;padding:6px;text-align:center;font:inherit;border:1px solid var(--line);border-radius:6px}
  .hh-stepper button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;font:inherit;cursor:pointer}
  .hh-unit{font-size:13px;color:var(--muted)}
  .ot-wrap{margin-top:8px}
  .ot-toggle{background:transparent;border:1px dashed var(--line);border-radius:8px;padding:6px 12px;color:var(--accent);font:inherit;cursor:pointer;font-size:13px}
  .ot-field{margin-top:8px}
  .ot-field label{display:block;color:var(--muted);font-size:13px;margin-bottom:4px}
</style>
</head>
<body>

<div class="app-header">
  <h1>📊 業績回報 · 中科 15B</h1>
  <div class="sub" id="hdrSub">--</div>
</div>

<div class="container">

<div class="card">
  <h2>📅 回報日期</h2>
  <div class="row"><label>日期</label>
    <div class="val" id="dateDisp" style="display:flex;align-items:center;gap:6px;position:relative">
      <span id="dateText">--</span>
      <button type="button" id="editDateBtn" class="icon-btn" title="修改日期" style="position:relative">
        ✏️
        <!-- 隱形 date input 疊在按鈕上：iOS/Android 都直接點按鈕觸發原生 picker -->
        <input type="date" id="dateInput"
          style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;font-size:16px">
      </button>
    </div>
  </div>
  <!-- Hidden holders so JS keeps working -->
  <span id="userDisp" style="display:none">--</span>
  <span id="guestCount" style="display:none">0</span>
  <span id="atvDisp" style="display:none">0</span>
</div>

<div class="card">
  <h2>🍱 各餐別</h2>
  <div class="small" style="margin-bottom:8px">點 + 展開填寫，燃肌餐／預訂餐金額自動算</div>

  <div id="mealList"></div>

  <span id="daySum" style="display:none">$0</span>
</div>

<div class="card">
  <h2>⏱️ 今日上班人員</h2>
  <div class="small" style="margin-bottom:6px">點員工 + 展開填工時</div>

  <div id="personList"></div>
  <button id="addOther" type="button">+ 其他人員</button>
</div>

<div class="card">
  <h2>📈 當月累積（不含今日）</h2>
  <div class="monthly-row">
    <div>
      <div class="small">營業額</div>
      <div class="val" id="monthSum" style="font-size:18px">$0</div>
      <div class="small" style="margin-top:6px">工時</div>
      <div class="val" id="monthHoursSum" style="font-size:18px">-- h</div>
    </div>
    <div style="display:flex;gap:6px;flex-direction:column">
      <button id="manageRecords">刪除前一筆</button>
      <button id="fixMonth">修改總營業額</button>
      <button id="fixMonthHours">修改總工時</button>
    </div>
  </div>
</div>

<!-- Number-keyboard input modal -->
<div id="numInputModal" class="tp-modal" style="display:none">
  <div class="tp-sheet" style="max-width:320px">
    <div class="tp-title" id="numInputTitle">輸入數字</div>
    <div style="padding:18px">
      <input id="numInputField" type="number" inputmode="decimal" pattern="[0-9]*"
             style="width:100%;padding:14px;font-size:22px;text-align:right;border:1px solid var(--line);border-radius:10px;font:inherit"
             placeholder="0">
    </div>
    <div class="tp-actions">
      <button type="button" class="tp-cancel" onclick="closeNumberInput(false)">取消</button>
      <button type="button" class="tp-ok" onclick="closeNumberInput(true)">確定</button>
    </div>
  </div>
</div>

<!-- Records management modal -->
<div id="recordsModal" class="tp-modal" style="display:none">
  <div class="tp-sheet" style="max-width:380px">
    <div class="tp-title">我這個月的回報</div>
    <div id="recordsList" style="max-height:340px;overflow-y:auto;padding:10px"></div>
    <div class="tp-actions">
      <button type="button" class="tp-cancel" onclick="closeRecords()">關閉</button>
    </div>
  </div>
</div>

<!-- Custom wheel time picker modal -->
<div id="timePickerModal" class="tp-modal" style="display:none">
  <div class="tp-sheet">
    <div class="tp-title">選擇時間</div>
    <div class="tp-cols">
      <div class="tp-col-label">時</div>
      <div class="tp-col-label">分</div>
      <div class="tp-col" id="tpHours"></div>
      <div class="tp-col" id="tpMinutes"></div>
      <div class="tp-highlight"></div>
    </div>
    <div class="tp-actions">
      <button type="button" class="tp-cancel" onclick="closeTimePicker(false)">取消</button>
      <button type="button" class="tp-ok" onclick="closeTimePicker(true)">確定</button>
    </div>
  </div>
</div>

</div><!-- /container -->

<div id="errBox" class="err" style="margin:0 12px"></div>

<div class="submit-bar">
  <button id="btnSubmit" class="primary" type="button" disabled>請先填完必填欄位</button>
</div>

<script>
const LIFF_ID = "2010233112-XCCgtapU";
// Apps Script Web App URL (deployed 2026-06-06)
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyD9k3yTJpkZIq0DAmh4yS7W2OQvJwlDUJCUy16rii2ZeqC-p34b40ejog_lIywexxH/exec";

// 燃肌餐定價（每兩個月可能更新；改這張表即可）
// 鍵 = ISO 星期 (1=Mon, 2=Tue, ..., 5=Fri)
const MUSCLE_PRICE = {
  1: { small: 120, large: 135 },
  2: { small: 130, large: 145 },
  3: { small: 130, large: 145 },
  4: { small: 120, large: 135 },
  5: { small: 150, large: 180 }
};
const MUSCLE_DEFAULT = { small: 120, large: 135 }; // fallback for 假日

// 預訂餐單價
const PREORDER_PRICE = 110;

const MEALS = [
  { key:"lunch",    label:"午餐",   emoji:"🍱", type:"basic" },
  { key:"dinner",   label:"晚餐",   emoji:"🍽️", type:"basic" },
  { key:"muscle",   label:"燃肌餐", emoji:"💪", type:"muscle" },
  { key:"preorder", label:"預訂餐", emoji:"📦", type:"preorder" }
];

// === Date helpers ===
function rocFromDate(d){
  const y = d.getFullYear() - 1911;
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return { roc:`${y}.${m}.${dd} (${w})`, ym:`${y}_${m}`, iso: `${d.getFullYear()}-${m}-${dd}` };
}
function fmtNT(n){ return "$" + Number(n||0).toLocaleString('zh-TW'); }
function fmtHr(v){
  const n = Number(v) || 0;
  return (n % 1 === 0) ? String(Math.round(n)) : n.toFixed(1);
}

// === State (mutable date) ===
let STATE = rocFromDate(new Date());
let MONTH_KEY = "monthly_total_" + STATE.ym;
let serverMonthCache = null;  // latest fetched server month total (null = unknown / use local fallback)
function getMonth(){
  if (serverMonthCache != null) return serverMonthCache;
  return parseInt(localStorage.getItem(MONTH_KEY) || "0", 10);
}
function setMonth(v){ localStorage.setItem(MONTH_KEY, String(Math.max(0, parseInt(v,10) || 0))); }
async function fetchMonth(ym){
  if (!WEBHOOK_URL) return null;   // fallback localStorage
  try{
    const r = await fetch(`${WEBHOOK_URL}?ym=${encodeURIComponent(ym)}`, { method:'GET' });
    const j = await r.json();
    if (j.ok){
      // populate both caches
      serverHoursCache = Number(j.monthHours) || 0;
      return Number(j.monthTotal) || 0;
    }
    return null;
  } catch(e){ console.warn('fetchMonth failed', e); return null; }
}
function updateDate(d){
  STATE = rocFromDate(d);
  MONTH_KEY = "monthly_total_" + STATE.ym;
  serverMonthCache = null;
  serverHoursCache = null;
  document.getElementById('dateText').textContent = STATE.roc;
  document.getElementById('hdrSub').textContent = STATE.roc;
  const di = document.getElementById('dateInput');
  if (di) di.value = STATE.iso;
  // Refresh muscle pricing (depends on weekday) — but preserve existing input values
  refreshMuscleHints();
  // Refresh server month
  fetchMonth(STATE.ym).then(v=>{ if (v != null) serverMonthCache = v; recalc(); });
  recalc();
}

// Update only the muscle hint text (price by day), keep existing user inputs
function refreshMuscleHints(){
  const rate = getMuscleRate();
  const muscleTile = document.querySelector('.meal-tile[data-key="muscle"]');
  if (!muscleTile) return;
  const fields = muscleTile.nextElementSibling;
  if (!fields) return;
  const hint = fields.querySelector('.small');
  if (hint) hint.textContent = `本日定價：小 $${rate.small} / 大 $${rate.large}（自動依星期）`;
}

// === Boot ===
let profile = { displayName: "(未取得)", userId: null };
let employees = null;
let dayTotal = 0;

// One-shot seed for testing (per建全 2026-06-06 request):
// 累積至 6/4 含 月營業額 = 163,805 / 月總工時 = 135.5
function seedMonth(){
  const k1 = "monthly_total_115_06";
  if (localStorage.getItem(k1) == null){
    localStorage.setItem(k1, "163805");
  }
  const k2 = "monthly_hours_115_06";
  if (localStorage.getItem(k2) == null){
    localStorage.setItem(k2, "135.5");
  }
}

// === Monthly hours ===
let serverHoursCache = null;
function getMonthHours(){
  if (serverHoursCache != null) return serverHoursCache;
  return parseFloat(localStorage.getItem("monthly_hours_" + STATE.ym) || "0");
}
function setMonthHours(v){
  localStorage.setItem("monthly_hours_" + STATE.ym, String(Math.max(0, parseFloat(v) || 0)));
}

function showSuccessScreen(){
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;
    display:flex;align-items:center;justify-content:center;padding:24px
  `;
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:18px;padding:28px 24px;text-align:center;max-width:340px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.3)">
      <div style="font-size:56px;line-height:1;margin-bottom:14px">✅</div>
      <div style="font-size:18px;font-weight:700;color:var(--brand);margin-bottom:6px">已成功送出</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.6">
        訊息已送到聊天室<br>
        <strong>提示：</strong>返回 LINE 後若看不到新訊息，<br>
        手動往下拉到底就能看到
      </div>
      <button type="button" id="closeSuccessBtn"
        style="width:100%;padding:14px;background:linear-gradient(135deg,var(--brand),var(--brand-dim));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(143,46,41,.25)">
        返回 LINE 聊天室
      </button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#closeSuccessBtn').addEventListener('click', ()=>{
    try{ liff.closeWindow(); } catch(e){}
  });
}

async function boot(){
  seedMonth();
  document.getElementById('dateText').textContent = STATE.roc;
  document.getElementById('hdrSub').textContent = STATE.roc;
  await Promise.all([initLiff(), loadEmployees()]);
  renderMeals();
  renderPersons();
  attachHandlers();
  // Fetch current month total from server (if WEBHOOK_URL configured)
  const v = await fetchMonth(STATE.ym);
  if (v != null) { serverMonthCache = v; }
  // Use recalc to update BOTH monthSum and monthHoursSum (bug fix v15)
  recalc();
}

async function initLiff(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    document.getElementById('userDisp').textContent = profile.displayName;
  } catch(e){
    document.getElementById('userDisp').textContent = "(LIFF 載入失敗)";
    console.warn(e);
  }
}

async function loadEmployees(){
  try{
    const res = await fetch('employees.json?v=' + Date.now(), { cache:"no-store" });
    employees = await res.json();
  } catch(e){
    employees = { site:"中科台積電15B", groups:[] };
  }
}

// === Meals ===
function getMuscleRate(){
  // STATE.iso is YYYY-MM-DD; Date getDay() returns 0=Sun..6=Sat → map to 1..7 (Mon=1)
  const d = new Date(STATE.iso + 'T00:00:00');
  const dow = d.getDay() === 0 ? 7 : d.getDay();
  return MUSCLE_PRICE[dow] || MUSCLE_DEFAULT;
}

function renderMeals(){
  const host = document.getElementById('mealList');
  host.innerHTML = "";

    const tile = document.createElement('div');
    tile.className = 'meal-tile';
    tile.dataset.key = m.key;

function buildPersonTile(name, group, isOther, schedule){
  const tile = document.createElement('div');
  tile.className = 'person-tile';
  tile.dataset.name = name;
  tile.dataset.group = group;
  if (isOther) tile.dataset.other = '1';
  const removeBtn = isOther ? `<button type="button" class="person-remove" title="刪除">✕</button>` : '';
  tile.innerHTML = `<div class="name">${name}</div><div style="display:flex;align-items:center;gap:6px">${removeBtn}<div class="plus">+</div></div>`;

  const fields = document.createElement('div');
  fields.className = 'person-fields';
  const otherInput = isOther ? `
    <div class="field" style="grid-column:1/-1">
      <label>姓名</label>
      <input type="text" data-k="name" value="${name === '其他人員' ? '' : name}" placeholder="輸入姓名">
    </div>
    <div class="field" style="grid-column:1/-1">
      <label>身份</label>
      <div class="grp-toggle">
        <button type="button" data-grp="正職" class="${group==='正職'?'on':''}">💼 正職</button>
        <button type="button" data-grp="兼職" class="${group==='兼職'?'on':''}">⏱️ 兼職</button>
      </div>
    </div>` : '';
  const sched = schedule || getDefaultSchedule();
  fields.innerHTML = `
    <div class="grid">
      ${otherInput}
      <div class="field"><label>上班</label>${timeWheelInput('start', sched.start)}</div>
      <div class="field"><label>下班</label>${timeWheelInput('end', sched.end)}</div>
      <div class="field"><label>休息（小時）</label>${halfHourStepper('rest')}</div>
    </div>
    <div class="ot-wrap">
      <button type="button" class="ot-toggle">＋ 加班</button>
      <div class="ot-field" style="display:none">
        <label>加班（小時）</label>${halfHourStepper('ot')}
      </div>
    </div>
  `;
  // Wire up OT toggle
  setTimeout(()=>{
    const otBtn = fields.querySelector('.ot-toggle');
    const otField = fields.querySelector('.ot-field');
    if (otBtn && otField){
      otBtn.addEventListener('click', ()=>{
        const showing = otField.style.display !== 'none';
        otField.style.display = showing ? 'none' : 'block';
        otBtn.textContent = showing ? '＋ 加班' : '− 隱藏加班';
        if (showing){
          // reset to 0 when hiding
          const otIn = otField.querySelector('input[data-k="ot"]');
          if (otIn) otIn.value = 0;
        }
      });
    }
    // Wire stepper +/- buttons
    fields.querySelectorAll('.hh-stepper').forEach(stepper=>{
      const input = stepper.querySelector('input[type=number]');
      stepper.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          let v = parseFloat(input.value) || 0;
          v += (btn.dataset.act === 'plus') ? 0.5 : -0.5;
          v = Math.max(0, Math.min(6, v));
          input.value = v;
        });
      });
    });
  }, 0);
  tile.addEventListener('click', e=>{
    if (e.target.closest('.person-fields') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    tile.classList.toggle('on');
    validate();   // BUG fix: validate after person toggle
  });

  // group tile + fields together
  const wrapper = document.createElement('div');
  wrapper.appendChild(tile);
  wrapper.appendChild(fields);
  return wrapper;
}

function timeWheelInput(k, defaultVal){

function halfHourStepper(k){

    <input type="number" min="0" max="6" step="0.5" value="0" data-k="${k}">

    <button type="button" data-act="plus" data-k="${k}">＋</button>
  </div>`;
}

// === Custom wheel time picker ===
let _tpTarget = null;
function openTimePicker(btn){
  _tpTarget = btn;
  const cur = (btn.dataset.val || '09:00').split(':');
  const curH = parseInt(cur[0], 10) || 0;
  const curM = parseInt(cur[1], 10) || 0;
  const hours = document.getElementById('tpHours');
  const minutes = document.getElementById('tpMinutes');
  hours.innerHTML = ''; minutes.innerHTML = '';
  // Add top + bottom padding (2 items each side so selected is centered)
  for (let i = 0; i < 2; i++){
    hours.innerHTML += '<div class="tp-item"></div>';
    minutes.innerHTML += '<div class="tp-item"></div>';
  }
  for (let h = 0; h <= 23; h++){
    hours.innerHTML += `<div class="tp-item" data-v="${h}">${String(h).padStart(2,'0')}</div>`;
  }
  // 0.5 step → minutes 00, 30
  [0, 30].forEach(m=>{
    minutes.innerHTML += `<div class="tp-item" data-v="${m}">${String(m).padStart(2,'0')}</div>`;
  });
  for (let i = 0; i < 2; i++){
    hours.innerHTML += '<div class="tp-item"></div>';
    minutes.innerHTML += '<div class="tp-item"></div>';
  }
  document.getElementById('timePickerModal').style.display = 'flex';
  // Scroll to selected after modal visible
  requestAnimationFrame(()=>{
    hours.scrollTop = curH * 40;
    minutes.scrollTop = (curM === 30 ? 1 : 0) * 40;
    markSelected();
  });
  hours.onscroll = markSelected;
  minutes.onscroll = markSelected;
}
function markSelected(){
  ['tpHours','tpMinutes'].forEach(id=>{
    const col = document.getElementById(id);
    const idx = Math.round(col.scrollTop / 40);
    col.querySelectorAll('.tp-item').forEach((el,i)=>{
      el.classList.toggle('selected', i === idx + 2);
    });
  });
}
function closeTimePicker(commit){
  if (commit && _tpTarget){
    const hCol = document.getElementById('tpHours');
    const mCol = document.getElementById('tpMinutes');
    const hIdx = Math.round(hCol.scrollTop / 40);
    const mIdx = Math.round(mCol.scrollTop / 40);
    const hEl = hCol.querySelectorAll('.tp-item')[hIdx + 2];
    const mEl = mCol.querySelectorAll('.tp-item')[mIdx + 2];
    const h = hEl && hEl.dataset.v != null ? parseInt(hEl.dataset.v, 10) : 9;
    const m = mEl && mEl.dataset.v != null ? parseInt(mEl.dataset.v, 10) : 0;
    const val = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    _tpTarget.dataset.val = val;
    _tpTarget.textContent = val;
  }
  document.getElementById('timePickerModal').style.display = 'none';
  _tpTarget = null;
}
window.openTimePicker = openTimePicker;
window.closeTimePicker = closeTimePicker;

function fmtT(v){
  // accept either "HH:MM" or numeric hours
  if (typeof v === 'string' && v.includes(':')) return v;
  const f = parseFloat(v);
  const h = Math.floor(f);
  const m = (f - h) === 0.5 ? "30" : "00";
  return String(h).padStart(2,'0') + ":" + m;
}
function timeToFloat(t){
  if (typeof t === 'number') return t;
  const [h, m] = (t || '00:00').split(':').map(Number);
  return h + (m || 0)/60;
}
window.fmtT = fmtT;

// === Calc ===
function recalc(){
  // First pass: compute derived values for muscle / preorder
  MEALS.forEach(m=>{
    if (m.type === 'muscle'){
      const rate = getMuscleRate();
      const s = parseInt(document.querySelector(`[data-meal="${m.key}"][data-k="small"]`)?.value || "0", 10);
      const l = parseInt(document.querySelector(`[data-meal="${m.key}"][data-k="large"]`)?.value || "0", 10);
      const count = s + l;
      const amount = s * rate.small + l * rate.large;
      const cInp = document.querySelector(`[data-meal="${m.key}"][data-k="count"]`);
      const aInp = document.querySelector(`[data-meal="${m.key}"][data-k="amount"]`);
      if (cInp) cInp.value = count;
      if (aInp) aInp.value = amount;
      const cDsp = document.querySelector(`[data-display="${m.key}-count"]`);
      const aDsp = document.querySelector(`[data-display="${m.key}-amount"]`);
      if (cDsp) cDsp.textContent = count > 0 ? (count + ' 份') : '--';
      if (aDsp) aDsp.textContent = amount > 0 ? fmtNT(amount) : '--';
    } else if (m.type === 'preorder'){
      const cInp = document.querySelector(`[data-meal="${m.key}"][data-k="count"]`);
      const aInp = document.querySelector(`[data-meal="${m.key}"][data-k="amount"]`);
      if (!cInp || !aInp) return;
      const count = parseInt(cInp.value || "0", 10);
      // If amount was manually overridden, don't recalc
      if (aInp.dataset.manual !== '1'){
        aInp.value = count * PREORDER_PRICE;
        aInp.placeholder = String(count * PREORDER_PRICE);
      }
    }
  });

  let total = 0;
  let totalCount = 0;
  document.querySelectorAll('.meal-tile.on').forEach(tile=>{
    const k = tile.dataset.key;
    const amt = parseInt(document.querySelector(`[data-meal="${k}"][data-k="amount"]`).value || "0", 10);
    const cnt = parseInt(document.querySelector(`[data-meal="${k}"][data-k="count"]`).value || "0", 10);
    total += amt;
    totalCount += cnt;
  });
  dayTotal = total;
  document.getElementById('daySum').textContent = fmtNT(total);

  // Auto guest count = sum of meal counts
  document.getElementById('guestCount').textContent = totalCount > 0 ? totalCount + ' 人' : '--';
  // ATV = total amount / total count
  document.getElementById('atvDisp').textContent = totalCount > 0 ? fmtNT(Math.round(total / totalCount)) : "--";

  // monthly累積 = 不含當日 (純伺服器值)
  document.getElementById('monthSum').textContent = fmtNT(getMonth());

  // Day hours = sum of selected persons' worked + OT
  let dayH = 0;
  document.querySelectorAll('.person-tile.on').forEach(tile=>{
    const wrapper = tile.parentElement;
    const fields = wrapper.querySelector('.person-fields');
    if (!fields) return;
    const startStr = (fields.querySelector('[data-k="start"]')?.dataset.val) || '08:00';
    const endStr = (fields.querySelector('[data-k="end"]')?.dataset.val) || '17:00';
    const s = timeToFloat(startStr), e = timeToFloat(endStr);
    const rest = parseFloat(fields.querySelector('input[data-k="rest"]')?.value) || 0;
    const otField = fields.querySelector('.ot-field');
    const ot = (otField && otField.style.display !== 'none')
      ? (parseFloat(fields.querySelector('input[data-k="ot"]')?.value) || 0) : 0;
    const worked = Math.max(0, (e > s ? e - s : e + 24 - s) - rest);
    dayH += worked + ot;
  });
  const dhd = document.getElementById('dayHoursDisp');
  if (dhd) dhd.textContent = dayH > 0 ? fmtHr(dayH) + ' h' : '--';
  // monthly工時 = 不含當日 (純伺服器值)
  document.getElementById('monthHoursSum').textContent = fmtHr(getMonthHours()) + ' h';

  validate();
}

function refreshMonthly(){
  document.getElementById('monthSum').textContent = fmtNT(getMonth() + dayTotal);
}

function validate(){
  const btn = document.getElementById('btnSubmit');
  const anyMeal = document.querySelectorAll('.meal-tile.on').length > 0;
  const anyPerson = document.querySelectorAll('.person-tile.on').length > 0;
  if (anyMeal && anyPerson){
    btn.disabled = false;
    btn.textContent = "送出回報";
  } else {
    btn.disabled = true;
    btn.textContent = "請先選餐別 + 員工";
  }
}

async function openRecords(){
  const modal = document.getElementById('recordsModal');
  const list = document.getElementById('recordsList');
  modal.style.display = 'flex';
  list.innerHTML = '<div class="small" style="text-align:center;padding:20px">載入中…</div>';
  if (!WEBHOOK_URL){
    list.innerHTML = '<div style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:8px">⏳</div><div class="small" style="color:var(--muted);line-height:1.6">雲端紀錄功能等待 Apps Script 部署完成<br>部署後此功能立即可用<br><br>暫時改 / 刪請聯絡管理員手動處理</div></div>';
    return;
  }
  try{
    const r = await fetch(`${WEBHOOK_URL}?action=list&ym=${encodeURIComponent(STATE.ym)}&userId=${encodeURIComponent(profile.userId||'')}`);
    const j = await r.json();
    if (!j.ok){
      list.innerHTML = '<div class="small" style="color:var(--warn);padding:20px">' + (j.error || '查詢失敗') + '</div>';
      return;
    }
    if (!j.items || !j.items.length){
      list.innerHTML = '<div class="small" style="text-align:center;padding:20px">這個月還沒有你的回報紀錄</div>';
      return;
    }
    list.innerHTML = '';
    j.items.forEach(item => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px';
      const hours = fmtHr(item.dayHours);
      row.innerHTML = `
        <div>
          <div style="font-weight:600">${item.date}</div>
          <div class="small">${fmtNT(item.dayAmt)} / ${hours}h</div>
        </div>
        <button class="rec-del" data-id="${item.id}" style="background:transparent;border:1px solid var(--warn);color:var(--warn);border-radius:6px;padding:4px 10px;font:inherit;cursor:pointer">刪除</button>
      `;
      list.appendChild(row);
    });
    list.querySelectorAll('.rec-del').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if (!confirm('確定要刪除這筆？月累積會跟著扣回。')) return;
        btn.disabled = true; btn.textContent = '刪除中…';
        try{
          const dr = await fetch(WEBHOOK_URL, {
            method:'POST',
            headers:{ 'Content-Type':'text/plain' },
            body: JSON.stringify({ action:'delete', ym: STATE.ym, id: btn.dataset.id })
          });
          const dj = await dr.json();
          if (dj.ok){
            serverMonthCache = Number(dj.monthTotal) || 0;
            serverHoursCache = Number(dj.monthHours) || 0;
            refreshMonthly();
            recalc();
            openRecords();   // refresh list
          } else {
            alert('刪除失敗：' + (dj.error || 'unknown'));
            btn.disabled = false; btn.textContent = '刪除';
          }
        } catch(e){ alert('刪除錯誤：' + e); btn.disabled = false; btn.textContent = '刪除'; }
      });
    });
  } catch(e){
    list.innerHTML = '<div class="small" style="color:var(--warn);padding:20px">查詢錯誤：' + e + '</div>';
  }
}

// === Collect + Submit ===
function collect(){
  const meals = [];
  document.querySelectorAll('.meal-tile.on').forEach(tile=>{
    const k = tile.dataset.key;
    const meta = MEALS.find(m=>m.key===k);
    const count = parseInt(document.querySelector(`[data-meal="${k}"][data-k="count"]`).value || "0", 10);
    const amount = parseInt(document.querySelector(`[data-meal="${k}"][data-k="amount"]`).value || "0", 10);
    const entry = { key:k, label:meta.label, emoji:meta.emoji, count, amount, type: meta.type };
    if (meta.type === 'muscle'){
      entry.small = parseInt(document.querySelector(`[data-meal="${k}"][data-k="small"]`)?.value || "0", 10);
      entry.large = parseInt(document.querySelector(`[data-meal="${k}"][data-k="large"]`)?.value || "0", 10);
    }
    meals.push(entry);
  });
  const persons = [];
  document.querySelectorAll('.person-tile.on').forEach(tile=>{
    const wrapper = tile.parentElement;
    const fields = wrapper.querySelector('.person-fields');
    let name = tile.dataset.name;
    if (tile.dataset.other === '1'){
      const inp = fields.querySelector('input[data-k="name"]');
      if (inp && inp.value.trim()) name = inp.value.trim();
    }
    const startStr = (fields.querySelector('[data-k="start"]').dataset.val) || (fields.querySelector('[data-k="start"]').value) || '09:00';
    const endStr = (fields.querySelector('[data-k="end"]').dataset.val) || (fields.querySelector('[data-k="end"]').value) || '20:00';
    const start = timeToFloat(startStr);
    const end = timeToFloat(endStr);
    const restEl = fields.querySelector('input[data-k="rest"]');
    const otEl = fields.querySelector('input[data-k="ot"]');
    const rest = restEl ? parseFloat(restEl.value) || 0 : 0;
    const ot = (otEl && fields.querySelector('.ot-field') && fields.querySelector('.ot-field').style.display !== 'none')
      ? (parseFloat(otEl.value) || 0) : 0;
    const worked = (end > start ? end - start : end + 24 - start) - rest;
    persons.push({ name, group: tile.dataset.group, start: startStr, end: endStr, rest, ot, worked: Math.max(0, worked) });
  });
  const dayAmt = meals.reduce((s,m)=>s+m.amount, 0);
  const guests = meals.reduce((s,m)=>s + (m.count || 0), 0);
  const atv = guests > 0 ? Math.round(dayAmt / guests) : 0;
  const monthTotal = getMonth();   // 不含當日
  // total hours = sum of worked + ot
  const dayHours = persons.reduce((s,p)=> s + p.worked + (p.ot || 0), 0);
  const monthHours = getMonthHours();   // 不含當日
  return {
    date: STATE.roc, site:"中科台積電15B", reporter: profile.displayName,
    guests, atv, meals, persons, dayAmt, monthTotal, dayHours, monthHours
  };
}

function buildText(d){
  const lines = [];
  lines.push('日期：' + d.date);
  lines.push('場所：' + d.site);
  lines.push('來客數：' + d.guests);
  lines.push('客單價(當日業績/來客數)：' + d.atv);
  lines.push('今日營業額：' + d.dayAmt);
  lines.push('當月營業額加總：' + (d.monthTotal + d.dayAmt));
  lines.push('---');
  // Filter out meals where both count and amount are 0
  const validMeals = d.meals.filter(m => (m.count || 0) > 0 || (m.amount || 0) > 0);
  validMeals.forEach(m => {
    lines.push('【' + (m.emoji || '') + ' ' + m.label + '】');
    if (m.type === 'muscle'){
      lines.push('小：' + (m.small || 0) + ' / 大：' + (m.large || 0));
    }
    lines.push('餐數：' + m.count);
    lines.push('營業額：' + m.amount);
  });
  lines.push('---');
  lines.push('今日上班人員');
  const byGroup = {};
  d.persons.filter(p => p.name && p.name.trim()).forEach(p=>{
    (byGroup[p.group] = byGroup[p.group] || []).push(p);
  });
  // 正職 always before 兼職
  const groupOrder = ['正職', '兼職'];
  const sortedGroups = Object.keys(byGroup).sort((a, b) => {
    const ai = groupOrder.indexOf(a);
    const bi = groupOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const GROUP_EMOJI = { '正職': '💼', '兼職': '⏱️' };
  sortedGroups.forEach(g => {
    const e = GROUP_EMOJI[g] || '';
    lines.push('【' + (e ? e + ' ' : '') + g + '】');
    byGroup[g].forEach(p => {
      const totalH = (p.worked + (p.ot || 0));
      const otPart = p.ot > 0 ? ('加班:' + fmtHr(p.ot) + 'h/') : '';
      lines.push(p.name + '：' + p.start + '-' + p.end);
      lines.push('(休息:' + fmtHr(p.rest) + 'h/' + otPart + '工時:' + fmtHr(totalH) + 'h)');
    });
  });
  lines.push('');
  lines.push('今日總工時：' + fmtHr(d.dayHours) + 'h');
  lines.push('當月總工時加總：' + fmtHr(d.monthHours + d.dayHours) + 'h');
  // 不再插 ZWSP (建全選 2: 接受 LINE auto-linkify, 換來 LINE 搜尋功能可用)
  return lines.join('\n');
}

async function submit(){
  const errBox = document.getElementById('errBox');
  errBox.textContent = "";
  try{
    const d = collect();
    // 1) Post to Apps Script backend (record + get new month total)
    if (WEBHOOK_URL){
      try{
        const r = await fetch(WEBHOOK_URL, {
          method:'POST',
          headers:{ 'Content-Type':'text/plain' },   // text/plain avoids preflight in Apps Script
          body: JSON.stringify({
            action:'submit',
            date: d.date, ym: STATE.ym, site: d.site,
            reporter: d.reporter, userId: profile.userId || '',
            dayAmt: d.dayAmt, dayHours: d.dayHours,
            meals: d.meals, persons: d.persons   // 完整明細存進 sheet (v30 — D 方案)
          })
        });
        const j = await r.json();
        if (j.ok){
          // Cache the NEW server values (含今日 after our POST) for next UI refresh
          serverMonthCache = Number(j.monthTotal) || 0;
          serverHoursCache = Number(j.monthHours) || 0;
          // d.monthTotal / d.monthHours 保留為提交前的值 (不含今日)，per建全
        }
      } catch(e){ console.warn('webhook submit failed', e); }
    }
    const text = buildText(d);
    if (!liff || !liff.sendMessages){
      errBox.textContent = "LIFF SDK 未載入，無法送出";
      return;
    }
    const payload = [{ type:'text', text }];
    try{
      await liff.sendMessages(payload);
    } catch(sendErr){
      // log full payload to help debug
      console.error('sendMessages failed', sendErr, JSON.stringify(payload));
      const payloadStr = JSON.stringify(payload);
      errBox.innerHTML = '送出失敗：' + (sendErr.code || '') + ' ' + (sendErr.message || sendErr) +
        '<br><small>payload 長度 ' + payloadStr.length + ' bytes</small>' +
        '<br><details style="margin-top:6px"><summary style="cursor:pointer">查看 Flex JSON</summary>' +
        '<textarea readonly style="width:100%;height:160px;font-size:10px;font-family:monospace">' +
        payloadStr.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</textarea></details>';
      return;
    }
    // local fallback bump (in case webhook absent)
    if (serverMonthCache == null) setMonth(getMonth() + d.dayAmt);
    if (serverHoursCache == null) setMonthHours(getMonthHours() + d.dayHours);
    // LINE 對話置底其實不能由 LIFF 強制控制（LINE 客戶端保留 scroll 位置）
    // 改成：顯示成功訊息 + 按鈕讓使用者主動返回。新開 chat 才會自動 scroll 到底
    showSuccessScreen();
  } catch(e){
    console.error('submit error', e);
    errBox.textContent = "送出失敗：" + (e.message || e);
  }
}

boot();
</script>
